services:
  db:
    image: postgres:16
    container_name: saas-metrics-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: saas_metrics
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/migrations/001_initial_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d saas_metrics"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: